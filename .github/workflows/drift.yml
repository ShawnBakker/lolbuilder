name: Drift check

on:
  schedule:
    - cron: "17 6 * * 1" # weekly, Monday 06:17 UTC (off the hour to dodge cron herds)
  workflow_dispatch:

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @lolbuilder/qdata run drift
