name: Pipeline dry-run (PC-7)

on:
  workflow_dispatch:

jobs:
  dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @lolbuilder/pipeline run dry-run
      - uses: actions/upload-artifact@v4
        with:
          name: dry-run-shards
          path: apps/pipeline/dist/shards/
