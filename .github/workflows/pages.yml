name: Pages

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "apps/web/**"
      - "packages/core/**"
      - "packages/types/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:
    inputs:
      expected_generated_at:
        description: "Manifest generatedAt the compose step must observe (race guard)"
        default: ""

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build frontend
        run: |
          pnpm --filter @lolbuilder/web run build
          cp -r site/. apps/web/dist/
      - name: Compose dataset into site (PC-6 fallback — Pages is the frontend read path)
        env:
          GH_TOKEN: ${{ github.token }}
          EXPECTED: ${{ inputs.expected_generated_at || '' }}
        run: |
          set -euo pipefail
          TAG=$(gh release list --repo "$GITHUB_REPOSITORY" --json tagName \
            -q '[.[] | select(.tagName | startswith("data-"))][0].tagName' || true)
          if [ -z "$TAG" ]; then
            echo "no data release yet — deploying site without dataset"; exit 0
          fi
          PATCH="${TAG#data-}"
          # Race guard: --clobber asset replacement is not read-your-writes.
          # When the pipeline told us what to expect, retry until we see it.
          for attempt in 1 2 3 4 5 6; do
            rm -rf /tmp/data && mkdir -p /tmp/data
            gh release download "$TAG" --repo "$GITHUB_REPOSITORY" --pattern shards.zip --dir /tmp/data
            unzip -q /tmp/data/shards.zip -d /tmp/data/unzipped
            GOT=$(jq -r .generatedAt /tmp/data/unzipped/manifest.json)
            if [ -z "$EXPECTED" ] || [ "$GOT" = "$EXPECTED" ]; then
              echo "dataset $PATCH generatedAt=$GOT (attempt $attempt)"; break
            fi
            if [ "$attempt" = "6" ]; then
              echo "::error::stale dataset after 6 attempts: got $GOT, expected $EXPECTED"; exit 1
            fi
            echo "stale download (got $GOT, expected $EXPECTED) — retrying"; sleep 10
          done
          mkdir -p "apps/web/dist/data/$PATCH"
          mv /tmp/data/unzipped/shards/* "apps/web/dist/data/$PATCH/"
          mv /tmp/data/unzipped/manifest.json apps/web/dist/data/manifest.json
          echo "composed dataset $PATCH ($(ls apps/web/dist/data/$PATCH | wc -l) shards)"
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist
      - id: deployment
        uses: actions/deploy-pages@v4
